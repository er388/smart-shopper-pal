    <link rel="icon" href="/icon-512.png" type="image/png" />

    <meta name="mobile-web-app-capable" content="yes" />

    <meta property="og:title" content="Pson.io - Λίστα Ψωνιών" />

    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <script>
      // Apply theme before first paint to prevent flash
      (function(){
        try {
          var t = JSON.parse(localStorage.getItem('smartcart-theme') || '"light"');
          var cl = document.documentElement.classList;
          if (t === 'dark') cl.add('dark');
          else if (t === 'black') { cl.add('dark'); cl.add('theme-black'); }
          else if (t === 'green') { cl.add('dark'); cl.add('theme-green'); }
          else if (t === 'blue') { cl.add('dark'); cl.add('theme-blue'); }
          else if (t === 'red') { cl.add('dark'); cl.add('theme-red'); }
          // Legacy fallback
          else if (t === true || localStorage.getItem('smartcart-dark') === 'true') cl.add('dark');
        } catch(e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
